# Secret: sensitive configuration (passwords, tokens).
# LEARNING: Values are base64-encoded (NOT encrypted!). Use tools like
# sealed-secrets or external-secrets for real encryption at rest.
#
# To encode: echo -n "your_secret" | base64
apiVersion: v1
kind: Secret
metadata:
  name: clean-backend-secrets
  namespace: clean-backend
type: Opaque
data:
  # echo -n "mongo_user" | base64
  DB_USER: bW9uZ29fdXNlcg==
  # echo -n "mongo_pass" | base64
  DB_PASS: bW9uZ29fcGFzcw==
  # echo -n "my_access_secret" | base64
  ACCESS_TOKEN_SECRET: bXlfYWNjZXNzX3NlY3JldA==
  # echo -n "my_refresh_secret" | base64
  REFRESH_TOKEN_SECRET: bXlfcmVmcmVzaF9zZWNyZXQ=
